<template>
    <lightning-card title="Project Phases Management" icon-name="standard:task2">
        <div class="slds-p-around_medium">
            <div class="slds-m-bottom_small">
                <lightning-button label="Add Phase" icon-name="utility:add" onclick={handleAddPhase} class="slds-m-right_small"></lightning-button>
                <lightning-button label="Expand All" onclick={handleExpandAll} class="slds-m-left_x-small"></lightning-button>
                <lightning-button label="Collapse All" onclick={handleCollapseAll} class="slds-m-left_x-small"></lightning-button>

                <template if:true={isSaving}>
                    <lightning-spinner size="small" alternative-text="Auto-saving..."></lightning-spinner>
                </template>

                <div class="slds-m-top_small slds-text-color_success slds-text-heading_small">
                    <template if:true={gridData}>
                        {gridData.length} phases | Total Project Hours: <strong>{projectTotalHours}</strong> | CR1 Hours: <strong>{cr1TotalHours}</strong> | CR2 Hours: <strong>{cr2TotalHours}</strong>
                    </template>
                </div>
            </div>

            <div class="slds-scrollable_x">
                <lightning-tree-grid
                    key-field="id"
                    data={gridData}
                    columns={columns}
                    expanded-rows={expandedRows}
                    onrowaction={handleRowAction}
                    show-row-number-column="false"
                    hide-checkbox-column="true">
                </lightning-tree-grid>
            </div>
        </div>

        <template if:true={isEditModalOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close"
                                onclick={closeEditModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium">Edit Phase Details</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-input type="text" label="Name" value={editRow.name} data-field="name" required onchange={handleEditChange}></lightning-input>

                        <lightning-textarea
                            label="Description"
                            data-field="description"
                            value={editRow.description}
                            onchange={handleEditChange}
                            rows="4"
                            max-length="5.000"
                            placeholder="Enter phase description...">
                        </lightning-textarea>
                    
                        <template if:true={isProject}>
                            <lightning-input
                                class="slds-m-top_small"
                                type="checkbox"
                                label="Payment Milestone"
                                checked={editRow.billable}
                                data-field="billable"
                                onchange={handleEditChange}>
                            </lightning-input>
                        </template>

                        <template if:true={showHoursInput}>
                            <lightning-input
                                class="slds-m-top_small"
                                type="number"
                                label="Hours"
                                value={editRow.hours}
                                min="0"
                                step="0.1"
                                data-field="hours"
                                onchange={handleEditChange}
                                disabled={isHoursDisabled}>
                            </lightning-input>
                        </template>

                        <template if:true={showCr1InModal}>
                            <lightning-input
                                class="slds-m-top_small"
                                type="number"
                                label="CR1 Hours"
                                value={editRow.cr1Hours}
                                min="0"
                                step="0.1"
                                data-field="cr1Hours"
                                onchange={handleEditChange}>
                            </lightning-input>
                        </template>

                        <template if:true={showCr2InModal}>
                            <lightning-input
                                class="slds-m-top_small"
                                type="number"
                                label="CR2 Hours"
                                value={editRow.cr2Hours}
                                min="0"
                                step="0.1"
                                data-field="cr2Hours"
                                onchange={handleEditChange}>
                            </lightning-input>
                        </template>
                    </div>

                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={closeEditModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button variant="brand" label="Save" onclick={saveEditRow}></lightning-button>
                    </footer>
                </div>
            </section>

            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
